name: AuraSEO Security & CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Runs at 2:00 AM UTC every night to catch dependency drift
    - cron: '0 2 * * *'

# This silences the Node 20 deprecation warning for GitHub's backend runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install uv package manager
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Verify Lockfile Synchronization (Supply Chain Scan)
        run: |
          uv pip compile requirements.in --generate-hashes -o temp_requirements.txt
          
          # Use diff -w to ignore Windows (CRLF) vs Linux (LF) line ending differences
          if ! diff -w requirements.txt temp_requirements.txt; then
            echo "======================================================================"
            echo "CRITICAL: Lockfile drift detected! See the diff output above."
            echo "Ensure you ran 'uv pip compile requirements.in --generate-hashes -o requirements.txt' and committed the result."
            echo "======================================================================"
            exit 1
          fi

      - name: Install Dependencies
        run: uv pip sync requirements.txt

      - name: Run Test Suite
        run: uv run pytest test_aura_seo.py -v

      - name: Vulnerability Audit (Supply Chain Scan)
        run: |
          uv pip install pip-audit
          uv run pip-audit -r requirements.txt