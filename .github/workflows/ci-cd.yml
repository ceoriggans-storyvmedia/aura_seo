name: AuraSEO Security & CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Runs at 2:00 AM UTC every night to catch dependency drift
    - cron: '0 2 * * *'

# This silences the Node 20 deprecation warning for GitHub's backend runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install uv package manager
        run: pip install uv

      - name: Verify Lockfile Synchronization (Supply Chain Scan)
        run: |
          uv pip compile requirements.in --generate-hashes -o temp_requirements.txt
          
          python -c "
          import sys
          def read_reqs(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  # Strip line endings/whitespace and ignore comment headers
                  return [line.strip() for line in f if line.strip() and not line.startswith('#')]
          
          req_local = read_reqs('requirements.txt')
          req_server = read_reqs('temp_requirements.txt')
          
          if req_local != req_server:
              print('======================================================================')
              print('CRITICAL: Lockfile drift detected!')
              print('Ensure you ran uv pip compile locally and committed the requirements.txt')
              print('======================================================================')
              sys.exit(1)
          "

      - name: Install Dependencies
        run: uv pip sync requirements.txt

      - name: Run Test Suite
        run: uv run pytest test_aura_seo.py -v

      - name: Vulnerability Audit (Supply Chain Scan)
        run: |
          uv pip install pip-audit
          uv run pip-audit -r requirements.txt
