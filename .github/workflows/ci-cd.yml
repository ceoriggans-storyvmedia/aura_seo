name: AuraSEO Security & CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Runs at 2:00 AM UTC every night to catch dependency drift
    - cron: '0 2 * * *'

# This silences the Node 20 deprecation warning for GitHub's backend runners
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.3"

      - name: Install uv package manager
        run: pip install uv

      - name: Verify Lockfile Synchronization (Supply Chain Scan)
        run: |
          # Compile directly to requirements.txt so the header matches your local file
          uv pip compile requirements.in --generate-hashes -o requirements.txt
          
          # Ask Git if the compile command resulted in any actual changes to the file
          if [ -n "$(git status --porcelain requirements.txt)" ]; then
            echo "======================================================================"
            echo "CRITICAL: Lockfile drift detected! See the exact differences below:"
            git diff requirements.txt
            echo "======================================================================"
            exit 1
          fi

      - name: Install Dependencies
        run: uv pip sync requirements.txt

      - name: Run Test Suite
        run: uv run pytest test_aura_seo.py -v

      - name: Vulnerability Audit (Supply Chain Scan)
        run: |
          uv pip install pip-audit
          uv run pip-audit -r requirements.txt